<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./register.css">
</head>

<body>

    <div class="container">
        <div class="register-box">

            <h2 class="text-center mb-4" style="color: #6366F1;">Form Đăng ký Tài khoản</h2>

            <form action="#" method="POST">

                <fieldset>
                    <legend>Thông tin cá nhân</legend>

                    <div class="mb-3">
                        <label for="fullname" class="form-label">Họ tên</label>
                        <input type="text" id="fullname" name="fullname" class="form-control"
                            placeholder="Nguyễn Văn A" required minlength="2" maxlength="50">
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="example@gmail.com"
                            required>
                    </div>

                    <div class="mb-3">
                        <label for="phone" class="form-label">Số điện thoại</label>
                        <input type="tel" id="phone" name="phone" class="form-control" placeholder="0987654321" required
                            pattern="[0-9]{10}">
                    </div>

                    <div class="mb-3">
                        <label for="dob" class="form-label">Ngày sinh</label>
                        <input type="date" id="dob" name="dob" class="form-control" required max="04/23/2026">
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Tài khoản</legend>

                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" id="username" name="username" class="form-control"
                            placeholder="Tên đăng nhập" required pattern="^[A-Za-z0-9_]{3,20}$">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control"
                            placeholder="Nhập mật khẩu" required minlength="8" pattern="^(?=.*[A-Z])(?=.*[0-9]).{8,}$">
                    </div>

                    <div class="mb-3">
                        <label for="cf_password" class="form-label">Xác nhận Password</label>
                        <input type="password" id="cf_password" name="cf_password" class="form-control"
                            placeholder="Nhập lại mật khẩu" required minlength="8"
                            pattern="^(?=.*[A-Z])(?=.*[0-9]).{8,}$">
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Thông tin giao hàng</legend>

                    <div class="mb-3">
                        <label for="city" class="form-label">Thành phố</label>
                        <select id="city" name="city" class="form-select" required>
                            <option value="">-- Chọn thành phố --</option>
                            <option>Hà Nội</option>
                            <option>TP Hồ Chí Minh</option>
                            <option>Đà Nẵng</option>
                            <option>Hải Phòng</option>
                            <option>Cần Thơ</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="district" class="form-label">Quận / Huyện</label>
                        <select id="district" name="district" class="form-select" required>
                            <option value="">-- Chọn quận/huyện --</option>
                            <option>Hoàng Mai</option>
                            <option>Hai Bà Trưng</option>
                            <option>Đống Đa</option>
                            <option>Cầu Giấy</option>
                            <option>Thanh Trì</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="address" class="form-label">Địa chỉ chi tiết</label>
                        <textarea id="address" name="address" class="form-control" rows="3"
                            placeholder="Số nhà, tên đường..." required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label d-block">Giới tính</label>

                        <div class="form-check form-check-inline">
                            <input type="radio" id="male" name="gender" value="Nam" class="form-check-input" required>
                            <label for="male" class="form-check-label">Nam</label>
                        </div>

                        <div class="form-check form-check-inline">
                            <input type="radio" id="female" name="gender" value="Nữ" class="form-check-input">
                            <label for="female" class="form-check-label">Nữ</label>
                        </div>

                        <div class="form-check form-check-inline">
                            <input type="radio" id="other" name="gender" value="Khác" class="form-check-input">
                            <label for="other" class="form-check-label">Khác</label>
                        </div>
                    </div>

                    <div class="form-check mb-3">
                        <input type="checkbox" id="agree" name="agree" class="form-check-input" required>
                        <label for="agree" class="form-check-label">
                            Tôi đồng ý với điều khoản sử dụng
                        </label>
                    </div>
                </fieldset>

                <div class="d-flex btn-group-custom">
                    <button type="submit" class="btn btn-submit w-50">Đăng ký</button>
                    <button type="reset" class="btn btn-outline-secondary w-50">Làm mới</button>
                </div>

            </form>
        </div>
    </div>

</body>

</html>
